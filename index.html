<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Madam Jii ❤️</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffd6e8,#fff);
font-family:Arial,sans-serif;
}

.page{
text-align:center;
}

h1{
color:#ff4081;
font-size:38px;
}

p{
font-size:20px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
}

img{
display:none;
width:95%;
max-width:700px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div class="page" id="welcome">
<h1>Welcome Madam Jii 💋🫶</h1>
<p>A small surprise is waiting for you ❤️</p>
<button onclick="showImage()">Next ➜</button>
</div>

<img id="letter" src="1000010013.jpg">

<script>
function showImage(){
document.getElementById("welcome").style.display="none";
document.getElementById("letter").style.display="block";
}
</script>

</body>
